<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Day 1 Challenge - Using Flex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container1">
        <div class="child1 top">C</div>
        <div class="child2 top pink">A</div>
        <div class="child3 top">D</div>
    </div>
    <div class="container2">
        <div class="child1 middle pink">B</div>
        <div class="child2 middle" style="gap: 1rem;">
            <div class="grandchild1 grandchild">E</div>
            <div class="grandchild2 grandchild">F</div>
        </div>
    </div>
    <div class="container3">
        <div class="child1 bottom">G</div>
        <div class="child2 bottom">H</div>
        <div class="child3 bottom">I</div>
    </div>
</body>
</html>
